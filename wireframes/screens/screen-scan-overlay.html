<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athena — Scan Overlay</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#1a1a1a;color:#fff;min-height:100vh;display:flex;align-items:flex-end;justify-content:center;padding-bottom:100px}

/* Simulated phone frame background */
.phone-bg{position:fixed;inset:0;background:linear-gradient(180deg,#1a1a1a 0%,#2d2d2d 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;opacity:0.4}
.phone-bg span{font-size:80px;opacity:0.2}
.phone-bg small{font-size:14px;color:#888;margin-top:10px}

/* Floating overlay pill */
.scan-overlay{position:fixed;bottom:48px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,0.92);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:50px;padding:10px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05) inset;z-index:9999}

/* Recording indicator */
.rec-dot{width:10px;height:10px;border-radius:50%;background:#f85149;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Timer */
.rec-timer{font-size:13px;font-weight:600;color:#f0f6fc;font-variant-numeric:tabular-nums;min-width:36px}

/* Divider */
.overlay-divider{width:1px;height:20px;background:rgba(255,255,255,0.15)}

/* Control buttons */
.ctrl-btn{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.ctrl-btn.scan{background:#f85149;color:white;box-shadow:0 0 0 4px rgba(248,81,73,0.25)}
.ctrl-btn.scan:hover{background:#ff6b63;transform:scale(1.05)}
.ctrl-btn.scan:active{transform:scale(0.95)}
.ctrl-btn.play{background:rgba(255,255,255,0.1);color:white}
.ctrl-btn.play:hover{background:rgba(255,255,255,0.2)}
.ctrl-btn.play.active{background:rgba(255,255,255,0.25)}
.ctrl-btn.finish{background:rgba(255,255,255,0.1);color:white}
.ctrl-btn.finish:hover{background:rgba(255,255,255,0.2)}
.ctrl-btn.finish:active{background:rgba(248,81,73,0.3)}

/* Small label under each button */
.ctrl-label{font-size:9px;color:rgba(255,255,255,0.5);text-align:center;margin-top:2px;white-space:nowrap}

/* Control group wrapper */
.ctrl-group{display:flex;flex-direction:column;align-items:center;gap:2px}

/* Scan ring animation */
.scan-btn-ring{position:relative;display:flex;align-items:center;justify-content:center}
.scan-btn-ring::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid rgba(248,81,73,0.4);animation:ring-pulse 1.5s ease-in-out infinite}
@keyframes ring-pulse{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.1);opacity:0.8}}

/* Top status bar (time remaining) */
.top-status{position:fixed;top:40px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:30px;padding:8px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.top-dot{width:8px;height:8px;border-radius:50%;background:#f85149;animation:pulse 1.5s infinite}
.top-label{font-size:12px;color:rgba(255,255,255,0.7)}
.top-time{font-size:13px;font-weight:700;color:#f0f6fc;font-variant-numeric:tabular-nums}

/* Hint bar */
.hint-bar{position:fixed;bottom:130px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border-radius:20px;padding:8px 18px;text-align:center;max-width:280px}
.hint-text{font-size:11px;color:rgba(255,255,255,0.6);line-height:1.4}
.hint-text strong{color:rgba(255,255,255,0.9)}

/* Scan mode label */
.scan-mode{position:fixed;top:90px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px}

/* Scrolling capture indicator on side */
.side-indicator{position:fixed;right:20px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px}
.side-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2)}
.side-dot.active{background:#58a6ff;box-shadow:0 0 8px rgba(88,166,255,0.6)}

/* Variant B: minimal bottom strip */
.scan-strip{position:fixed;bottom:0;left:0;right:0;background:rgba(20,20,20,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.06);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;z-index:9999}
.strip-left{display:flex;align-items:center;gap:10px}
.strip-rec{width:10px;height:10px;border-radius:50%;background:#f85149;animation:pulse 1.5s infinite}
.strip-time{font-size:14px;font-weight:700;color:#f0f6fc;font-variant-numeric:tabular-nums}
.strip-label{font-size:11px;color:rgba(255,255,255,0.5)}
.strip-right{display:flex;align-items:center;gap:16px}
.strip-btn{background:rgba(255,255,255,0.1);border:none;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;color:white;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.2s}
.strip-btn:hover{background:rgba(255,255,255,0.15)}
.strip-btn.stop{background:rgba(248,81,73,0.8)}
.strip-btn.stop:hover{background:#f85149}

/* Variant C: floating corners */
.corner-tl{position:fixed;top:20px;left:20px;background:rgba(30,30,30,0.85);backdrop-filter:blur(12px);border-radius:12px;padding:8px 14px;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,0.06)}
.corner-tr{position:fixed;top:20px;right:20px;background:rgba(30,30,30,0.85);backdrop-filter:blur(12px);border-radius:12px;padding:8px 14px;font-size:12px;font-weight:600;color:#f0f6fc;border:1px solid rgba(255,255,255,0.06)}
.corner-tl .rec{width:8px;height:8px;border-radius:50%;background:#f85149;animation:pulse 1.4s infinite}
.corner-tl .time{font-size:12px;font-weight:600;color:#f0f6fc;font-variant-numeric:tabular-nums}
.corner-tl .src{font-size:10px;color:rgba(255,255,255,0.4)}
</style>
</head>
<body>

<!-- Simulated background content -->
<div class="phone-bg">
  <span>📹</span>
  <small>Video playing in background</small>
</div>

<!-- TOP STATUS BAR -->
<div class="top-status">
  <div class="top-dot"></div>
  <span class="top-label">Scanning</span>
  <span class="top-time">0:03</span>
</div>

<div class="scan-mode">● REC</div>

<!-- SIDE INDICATOR -->
<div class="side-indicator">
  <div class="side-dot active"></div>
  <div class="side-dot active"></div>
  <div class="side-dot active"></div>
  <div class="side-dot"></div>
  <div class="side-dot"></div>
</div>

<!-- HINT BAR -->
<div class="hint-bar">
  <div class="hint-text">Tap <strong>▶</strong> to control capture — tap <strong>✕</strong> to finish early</div>
</div>

<!-- MAIN FLOATING OVERLAY (variant shown) -->
<div class="scan-overlay">
  <!-- Rec dot + timer -->
  <div class="rec-dot"></div>
  <span class="rec-timer">0:03</span>
  <div class="overlay-divider"></div>

  <!-- SCAN button -->
  <div class="ctrl-group">
    <div class="scan-btn-ring">
      <button class="ctrl-btn scan">⏺</button>
    </div>
  </div>

  <!-- PAUSE/PLAY button -->
  <div class="ctrl-group">
    <button class="ctrl-btn play" id="playBtn" onclick="this.classList.toggle('active')">⏸</button>
  </div>

  <!-- FINISH button -->
  <div class="ctrl-group">
    <button class="ctrl-btn finish" onclick="document.body.style.opacity='0.3'">✕</button>
  </div>
</div>

<!-- CORNER VARIANT (top-left mini HUD) -->
<div class="corner-tl" style="display:none">
  <div class="rec"></div>
  <span class="time">00:03</span>
  <span class="src">ATHENA</span>
</div>
<div class="corner-tr" style="display:none">+0:03</div>

<!-- BOTTOM STRIP VARIANT (commented out — alternative design) -->

    <div>

      <div class="strip-label">Scanning</div>
    </div>
  </div>
  <div class="strip-right">
    <button class="strip-btn" onclick="this.innerHTML='⏸ Pause'">⏯ Pause</button>
    <button class="strip-btn stop">✕ Finish</button>
  </div>

<script>
// Toggle play/pause icon
document.getElementById('playBtn').addEventListener('click', function(){
  this.textContent = this.classList.contains('active') ? '▶' : '⏸';
});
</script>
</body>
</html>
